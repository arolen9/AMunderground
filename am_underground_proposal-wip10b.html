<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&M Underground — Proposal Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:    #C8102E;
    --sky:    #5BC4E5;
    --navy:   #1A2744;
    --ink:    #1C1C1E;
    --muted:  #6B7280;
    --line:   #E4E7EC;
    --bg:     #F8F9FB;
    --white:  #FFFFFF;
    --field:  #FFFFFF;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,.08);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px 16px;
    line-height: 1.5;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    background: var(--white);
    padding: 32px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--line);
    padding-bottom: 20px;
    margin-bottom: 24px;
  }

  .logo-placeholder {
    font-weight: 700;
    font-size: 20px;
    color: var(--navy);
    letter-spacing: -0.5px;
  }
  .logo-placeholder span { color: var(--red); }

  .title-area h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    text-align: right;
  }

  h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--bg);
    padding: 20px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
  }

  .field-group {
    margin-bottom: 14px;
  }
  .field-group:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 4px;
  }

  input, textarea, select {
    width: 100%;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: var(--field);
    border: 1px solid var(--line);
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--navy);
  }

  textarea { resize: vertical; min-height: 80px; }

  /* Line items table wrapper */
  .table-responsive {
    margin-bottom: 24px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--white);
    font-size: 14px;
  }

  th {
    background: var(--navy);
    color: var(--white);
    text-align: left;
    padding: 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
  }
  tr:last-child td { border-bottom: none; }

  .col-desc { width: 50%; }
  .col-qty  { width: 15%; }
  .col-cost { width: 15%; }
  .col-total{ width: 15%; font-family: 'IBM Plex Mono', monospace; font-weight: 500; text-align: right; }
  .col-actions { width: 5%; text-align: center; }

  .btn-danger-icon {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn-danger-icon:hover { opacity: 0.7; }

  .table-actions-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .btn-secondary {
    background: var(--white);
    border: 1px solid var(--line);
    color: var(--navy);
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-secondary:hover { background: var(--bg); border-color: var(--muted); }

  .summary-box {
    text-align: right;
    font-size: 16px;
    font-weight: 600;
    color: var(--navy);
    padding: 12px;
    background: var(--bg);
    border-radius: 6px;
    display: inline-block;
    min-width: 200px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .footer-notes {
    margin-top: 12px;
    margin-bottom: 24px;
  }

  .btn-primary {
    display: block;
    width: 100%;
    background: var(--navy);
    color: var(--white);
    border: none;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.2s;
    text-align: center;
    box-shadow: 0 4px 12px rgba(26, 39, 68, 0.2);
  }
  .btn-primary:hover { background: #0f182c; }

  @media (max-width: 600px) {
    .grid-2 { grid-template-columns: 1fr; gap: 16px; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .title-area h1 { text-align: left; }
    .container { padding: 16px; }
    .table-actions-bar { flex-direction: column; align-items: stretch; gap: 16px; }
    .summary-box { text-align: left; width: 100%; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-placeholder">A&M <span>UNDERGROUND</span></div>
    <div class="title-area">
      <h1>PROPOSAL GENERATOR</h1>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <h2>Client Profile</h2>
      <div class="field-group">
        <label for="clientName">Company / Client Name</label>
        <input type="text" id="clientName" placeholder="e.g. City Grid Electric">
      </div>
      <div class="field-group">
        <label for="clientAddress">Billing / Job Address</label>
        <textarea id="clientAddress" placeholder="123 Industrial Parkway&#10;Suite 400&#10;Chicago, IL 60601"></textarea>
      </div>
    </div>

    <div class="card">
      <h2>Proposal Metadata</h2>
      <div class="field-group">
        <label for="proposalDate">Document Date</label>
        <input type="date" id="proposalDate">
      </div>
      <div class="field-group">
        <label for="jobDescription">Scope of Work Summary</label>
        <textarea id="jobDescription" placeholder="Directional boring, trenching, conduit placement, and site restoration services as outlined below."></textarea>
      </div>
    </div>
  </div>

  <h2>Scope Items & Financial Breakdown</h2>
  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th class="col-desc">Item / Service Description</th>
          <th class="col-qty">Qty</th>
          <th class="col-cost">Unit Cost ($)</th>
          <th class="col-total">Total ($)</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="lineItemsContainer">
        </tbody>
    </table>
  </div>

  <div class="table-actions-bar">
    <button type="button" class="btn-secondary" onclick="addNewLineItem()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      Add Scope Item
    </button>
    <div>
      <span style="font-size: 13px; color: var(--muted); margin-right: 12px; font-weight: 500;">Estimated Total:</span>
      <div class="summary-box" id="grandTotalDisplay">$0.00</div>
    </div>
  </div>

  <div class="card footer-notes">
    <h2>Standard Terms, Conditions & Exclusions</h2>
    <div class="field-group">
      <textarea id="termsConditions" style="min-height: 120px; font-size: 13px; line-height: 1.6;"></textarea>
    </div>
  </div>

  <button type="button" class="btn-primary" onclick="generatePDF()">Compile & Save Official Proposal PDF</button>
</div>

<script>
  // Pre-load default administrative context variables on mount
  document.getElementById('proposalDate').valueAsDate = new Date();

  const defaultTerms = 
    "1. VALIDITY: This proposal is firm and valid for 30 days from the document date.\n" +
    "2. PAYMENTS: Invoiced amounts are due net 30 days upon submission of intermediate or final progression milestones.\n" +
    "3. ROCK EXCLUSIONS: Unit pricing assumes normal unconsolidated soil structures. Any mechanical, pneumatic, or specialized extraction required for unexpected rock, boulders, or concrete obstacles will be billed as an extra modification out of scope.\n" +
    "4. UTILITIES & PERMITS: A&M Underground will coordinate standard public utility locating services (811). Private distribution paths, unmapped private conduits, or internal facility feeds must be declared by the owner. Specialized municipal permitting fees are excluded unless specifically detailed as a scope item above.";

  document.getElementById('termsConditions').value = defaultTerms;

  // Track operational rows
  let itemSequence = 0;

  // Helper row execution factory
  function addNewLineItem(description = '', qty = '', unitCost = '') {
    itemSequence++;
    const rowId = `row_${itemSequence}`;
    const tr = document.createElement('tr');
    tr.id = rowId;

    tr.innerHTML = `
      <td class="col-desc">
        <input type="text" class="input-desc" value="${description}" placeholder="e.g. 4-inch HDPE Directional Boring (Soil)">
      </td>
      <td class="col-qty">
        <input type="number" class="input-qty" value="${qty}" min="0" step="any" placeholder="0" oninput="calculateRowTotal('${rowId}')">
      </td>
      <td class="col-cost">
        <input type="number" class="input-cost" value="${unitCost}" min="0" step="any" placeholder="0.00" oninput="calculateRowTotal('${rowId}')">
      </td>
      <td class="col-total" id="${rowId}_total">$0.00</td>
      <td class="col-actions">
        <button type="button" class="btn-danger-icon" onclick="removeLineItem('${rowId}')" title="Delete Row">×</button>
      </td>
    `;

    document.getElementById('lineItemsContainer').appendChild(tr);
    calculateRowTotal(rowId);
  }

  function removeLineItem(rowId) {
    const row = document.getElementById(rowId);
    if (row) {
      row.remove();
      recalculateGrandTotal();
    }
  }

  function calculateRowTotal(rowId) {
    const row = document.getElementById(rowId);
    if (!row) return;

    const qty = parseFloat(row.querySelector('.input-qty').value) || 0;
    const cost = parseFloat(row.querySelector('.input-cost').value) || 0;
    const total = qty * cost;

    document.getElementById(`${rowId}_total`).innerText = `$${total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    recalculateGrandTotal();
  }

  function recalculateGrandTotal() {
    const totalCells = document.querySelectorAll('.col-total');
    let grandTotal = 0;

    totalCells.forEach(cell => {
      const val = parseFloat(cell.innerText.replace(/[^0-9.-]/g, '')) || 0;
      grandTotal += val;
    });

    document.getElementById('grandTotalDisplay').innerText = `$${grandTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
  }

  // Inject initial line items to guide layout profile on init
  addNewLineItem('Mobilization, Site Setup, and Safety Logistics', 1, 1250);
  addNewLineItem('Directional Boring: Placement of 2-inch SDR-11 Conduit', 450, 18);
  addNewLineItem('Utility Access Vault: 24" x 36" Precast Polymer Concrete', 2, 850);

  // Main compilation logic framework
  function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({
      orientation: 'portrait',
      unit: 'pt',
      format: 'letter'
    });

    const v = (id) => document.getElementById(id) ? document.getElementById(id).value.trim() : '';

    // Color swatches (Matching CSS Architecture)
    const cNavy  = [26, 39, 68];
    const cRed   = [200, 16, 46];
    const cMuted = [107, 114, 128];
    const cInk   = [28, 28, 30];
    const cLine  = [228, 231, 236];
    const cBg    = [248, 249, 251];

    // Page boundaries config
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 45;
    const contentW = pageW - (margin * 2);

    // Track active coordinates
    let y = margin;

    // Helper functions for typographic layout blocks
    function useColor(rgbArray) { doc.setTextColor(rgbArray[0], rgbArray[1], rgbArray[2]); }
    function useFill(rgbArray) { doc.setFillColor(rgbArray[0], rgbArray[1], rgbArray[2]); }
    function useDraw(rgbArray) { doc.setDrawColor(rgbArray[0], rgbArray[1], rgbArray[2]); }

    // Check spatial limits and add page break if layout bounds are crossed
    function checkSpace(needed) {
      if (y + needed > pageH - margin) {
        doc.addPage();
        y = margin;
        // Draw structural page background tint framing line
        useDraw(cLine);
        doc.setLineWidth(0.5);
        doc.line(margin, y, margin + contentW, y);
        y += 15;
      }
    }

    // ─── HEADER ROW ───
    useFill(cNavy);
    doc.rect(margin, y, 12, 28, 'F'); 

    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(20);
    useColor(cNavy);
    doc.text("A&M", margin + 18, y + 20);
    const amWidth = doc.getTextWidth("A&M ");
    useColor(cRed);
    doc.text("UNDERGROUND", margin + 18 + amWidth, y + 20);

    doc.setFontSize(14);
    useColor(cNavy);
    doc.text("COMMERCIAL PROPOSAL", pageW - margin, y + 18, { align: 'right' });
    y += 45;

    // Boundary divider
    useDraw(cLine);
    doc.setLineWidth(1.5);
    doc.line(margin, y, margin + contentW, y);
    y += 25;

    // ─── ADMINISTRATIVE / METADATA CARDS ───
    const colW = (contentW - 20) / 2;
    let cardStart = y;

    // Left Frame Information block
    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(10);
    useColor(cMuted);
    doc.text("PREPARED FOR:", margin, y);
    y += 14;

    doc.setFontSize(12);
    useColor(cNavy);
    const clientNameStr = v('clientName') || 'Client / Company Name Unspecified';
    doc.text(clientNameStr, margin, y);
    y += 16;

    doc.setFont('Helvetica', 'normal');
    doc.setFontSize(10);
    useColor(cInk);
    const addressLines = (v('clientAddress') || 'No address provided.').split('\n');
    addressLines.forEach(line => {
      doc.text(line, margin, y);
      y += 14;
    });
    let leftCardEnd = y;

    // Right Frame Information block Reset
    y = cardStart;
    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(10);
    useColor(cMuted);
    doc.text("PROPOSAL DETAILS:", margin + colW + 20, y);
    y += 14;

    doc.setFontSize(11);
    useColor(cNavy);
    const rawDate = v('proposalDate');
    let displayDate = 'Unspecified';
    if (rawDate) {
      const dateObj = new Date(rawDate + 'T00:00:00');
      displayDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }
    doc.text(`Date Issued: ${displayDate}`, margin + colW + 20, y);
    y += 18;

    doc.setFont('Helvetica', 'bold');
    useColor(cMuted);
    doc.text("Project Context Summary:", margin + colW + 20, y);
    y += 12;

    doc.setFont('Helvetica', 'normal');
    useColor(cInk);
    const scopeSummary = v('jobDescription') || 'General trenching and directional utility boring infrastructure setup.';
    const splitSummary = doc.splitTextToSize(scopeSummary, colW);
    splitSummary.forEach(line => {
      doc.text(line, margin + colW + 20, y);
      y += 13;
    });
    let rightCardEnd = y;

    // Synchronize height anchor points
    y = Math.max(leftCardEnd, rightCardEnd) + 25;

    // ─── COMPILING FINANCIAL WORK ITEMS TABLE ───
    checkSpace(40);
    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(11);
    useColor(cNavy);
    doc.text("SCOPE OF WORK & INVESTMENT SCHEDULE", margin, y);
    y += 12;

    // Table Column distribution array mappings
    const tColDesc  = margin;
    const tColQty   = margin + 310;
    const tColCost  = margin + 370;
    const tColTotal = margin + 440;
    const tColWTotal = contentW - 440;

    // Render Table Header Track
    useFill(cNavy);
    doc.rect(margin, y, contentW, 22, 'F');
    
    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(255, 255, 255);
    doc.text("Item / Service Description", tColDesc + 8, y + 14);
    doc.text("Qty", tColQty, y + 14, { align: 'right' });
    doc.text("Unit ($)", tColCost, y + 14, { align: 'right' });
    doc.text("Total ($)", tColTotal + tColWTotal - 8, y + 14, { align: 'right' });
    y += 22;

    // Process Line rows from active form DOM structures
    const rows = document.querySelectorAll('#lineItemsContainer tr');
    let grandTotal = 0;
    let alternateIndex = 0;

    rows.forEach(row => {
      const desc = row.querySelector('.input-desc').value.trim() || 'Unspecified Scope Item';
      const qty = parseFloat(row.querySelector('.input-qty').value) || 0;
      const cost = parseFloat(row.querySelector('.input-cost').value) || 0;
      const total = qty * cost;
      grandTotal += total;

      const splitDesc = doc.splitTextToSize(desc, 290);
      const rowH = Math.max(splitDesc.length * 14 + 10, 24);

      checkSpace(rowH);

      // Alternating row structural backgrounds
      if (alternateIndex % 2 === 1) {
        useFill(cBg);
        doc.rect(margin, y, contentW, rowH, 'F');
      }
      useDraw(cLine);
      doc.setLineWidth(0.5);
      doc.rect(margin, y, contentW, rowH, 'D');

      // Build out row parameters values output strings
      doc.setFont('Helvetica', 'normal');
      doc.setFontSize(10);
      useColor(cInk);

      let textY = y + 15;
      if (splitDesc.length === 1) {
        textY = y + (rowH / 2) + 3; 
      }
      
      splitDesc.forEach((line, index) => {
        doc.text(line, tColDesc + 8, textY + (index * 14));
      });

      const middleY = y + (rowH / 2) + 3;
      doc.text(qty.toLocaleString('en-US', { maximumFractionDigits: 2 }), tColQty, middleY, { align: 'right' });
      doc.text(cost.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }), tColCost, middleY, { align: 'right' });
      doc.text(total.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }), tColTotal + tColWTotal - 8, middleY, { align: 'right' });

      y += rowH;
      alternateIndex++;
    });

    // Render Grand Total summary card footprint
    checkSpace(28);
    useFill(cBg);
    doc.rect(margin, y, contentW, 26, 'F');
    useDraw(cNavy);
    doc.setLineWidth(1);
    doc.rect(margin, y, contentW, 26, 'D');

    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(10);
    useColor(cNavy);
    doc.text("TOTAL ESTIMATED INVESTMENT:", tColQty - 40, y + 16, { align: 'right' });
    doc.text(`$${grandTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`, tColTotal + tColWTotal - 8, y + 16, { align: 'right' });
    y += 45;

    // ─── COMPILING TERMS AND EXCLUSIONS ───
    const termsText = v('termsConditions');
    if (termsText) {
      const splitTerms = doc.splitTextToSize(termsText, contentW - 16);
      const termsBoxH = splitTerms.length * 14 + 24;

      checkSpace(termsBoxH + 20);

      useFill(cBg);
      useDraw(cLine);
      doc.setLineWidth(1);
      doc.rect(margin, y, contentW, termsBoxH, 'FD');

      let ty = y + 16;
      doc.setFont('Helvetica', 'bold');
      doc.setFontSize(9);
      useColor(cMuted);
      doc.text("PROPOSAL TERMS & LEGAL EXCLUSIONS", margin + 8, ty);
      ty += 16;

      doc.setFont('Helvetica', 'normal');
      doc.setFontSize(9);
      useColor(cInk);
      splitTerms.forEach(line => {
        doc.text(line, margin + 8, ty);
        ty += 13;
      });
    }

    // ─── EXPORT PIPELINE SETUP ───
    const clientName = v('clientName').replace(/[^a-zA-Z0-9\s]/g, '').replace(/\s+/g, '_').replace(/^_+|_+$/g, '') || 'Client';
    const rawDateStr = document.getElementById('proposalDate').value;
    let dateStamp = '';
    if (rawDateStr) {
      const [yr, mo, dy] = rawDateStr.split('-');
      if (yr && mo && dy) {
        dateStamp = `${mo}${dy}${yr.slice(-2)}`;
      }
    }

    const nameParts = ['A&M_Proposal'];
    if (clientName) nameParts.push(clientName);
    if (dateStamp) nameParts.push(dateStamp);
    const filename = `${nameParts.join('_')}.pdf`;

    // Generate a native raw binary Blob instead of a data URI string
    const blob = doc.output('blob');

    const isIOS = /ipad|iphone|ipod/i.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    if (isIOS) {
      // Turn the blob object into a concrete file container system for the sharing sheet
      const pdfFile = new File([blob], filename, { type: 'application/pdf' });

      if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
        navigator.share({
          files: [pdfFile],
          title: 'Proposal Document',
          text: 'A&M Underground Proposal'
        })
        .catch((error) => console.log('Sharing failed', error));
      } else {
        // Fallback redirection link if the user's browser version restricts the Web Share API
        const url = URL.createObjectURL(blob);
        window.location.href = url;
      }
    } else {
      // PC + Android standard fallback
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }
  }
</script>

</body>
</html>
